name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libsdl2-mixer-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPKGDATADIR=.

      - name: Build
        run: cmake --build build

      - name: Collect Linux artifacts
        run: |
          mkdir -p dist
          cp build/frogs dist/
          cp -r bmp wav doc dist/

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: frogs-linux
          path: dist/

  build-windows:
    name: Windows (MinGW)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Collect Windows artifacts
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/frogs.exe dist/
          cp -r bmp wav doc dist/
          # Copy all /mingw64/bin DLLs needed by the exe (ldd gives the full transitive list)
          ldd build/frogs.exe | grep '/mingw64/bin' | awk '{print $3}' | xargs -I{} cp {} dist/

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: frogs-windows
          path: dist/
